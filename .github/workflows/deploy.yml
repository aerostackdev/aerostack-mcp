name: Deploy MCPs to Aerostack

on:
  push:
    branches:
      - main        # → staging (dev)
      - production  # → production
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      only:
        description: 'Deploy specific hosted MCPs only (comma-separated, e.g. mcp-airtable,mcp-slack)'
        required: false
        default: ''
      deploy_all:
        description: 'Force deploy all hosted MCPs (ignore changed-files detection)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Deploy hosted MCPs (changed files only) ───────────────────────────
  deploy-hosted:
    name: Deploy hosted MCP servers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Set deploy environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "production" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          fi

      - name: Detect changed MCP directories
        run: |
          # If --only flag provided via workflow_dispatch, use that
          if [ -n "${{ github.event.inputs.only }}" ]; then
            echo "ONLY_FLAG=--only ${{ github.event.inputs.only }}" >> $GITHUB_ENV
            exit 0
          fi

          # Force-all or first commit → deploy everything
          if [ "${{ github.event.inputs.deploy_all }}" = "true" ] || ! git rev-parse HEAD~1 > /dev/null 2>&1; then
            echo "Deploying all MCPs"
            exit 0
          fi

          # Detect changed mcp-* dirs only
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^mcp-[^/]+/' | cut -d/ -f1 | sort -u | tr '\n' ',')
          CHANGED="${CHANGED%,}"

          if [ -n "$CHANGED" ]; then
            echo "Changed hosted MCPs: $CHANGED"
            echo "ONLY_FLAG=--only $CHANGED" >> $GITHUB_ENV
          else
            echo "SKIP_HOSTED=true" >> $GITHUB_ENV
          fi

      - name: Deploy changed hosted MCPs
        if: env.SKIP_HOSTED != 'true'
        env:
          AEROSTACK_API_KEY: ${{ secrets.AEROSTACK_API_KEY }}
        run: node scripts/deploy-all.mjs --hosted-only ${{ env.ONLY_FLAG }}

      - name: No hosted changes
        if: env.SKIP_HOSTED == 'true'
        run: echo "✅ No hosted MCP directories changed — skipping"

  # ── Job 2: Always sync proxy MCPs ────────────────────────────────────────────
  sync-proxies:
    name: Sync proxy MCP registrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set deploy environment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "DEPLOY_ENV=${{ github.event.inputs.env }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" = "production" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          fi

      - name: Sync all proxy MCPs
        env:
          AEROSTACK_API_KEY: ${{ secrets.AEROSTACK_API_KEY }}
        run: node scripts/deploy-all.mjs --proxies-only

      - name: Summary
        if: always()
        run: |
          echo "### MCP Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** $DEPLOY_ENV" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
