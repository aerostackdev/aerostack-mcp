name = "mcp-google-forms"
description = "Create and manage Google Forms — add questions, collect responses, and update form settings via the Google Forms API."
category = "Productivity"
tags = ["google-forms", "surveys", "forms", "google-workspace"]
env = ["GOOGLE_ACCESS_TOKEN"]
scopes = ["https://www.googleapis.com/auth/forms.body", "https://www.googleapis.com/auth/forms.responses.readonly", "https://www.googleapis.com/auth/drive"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
