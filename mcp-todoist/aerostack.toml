name = "mcp-todoist"
description = "Manage tasks, projects, and sections in Todoist — AI-powered task management for individuals and teams."
category = "Productivity"
tags = ["todoist", "tasks", "productivity", "todo", "projects"]
env = ["TODOIST_API_TOKEN"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
TODOIST_API_TOKEN = "Todoist API token. Find it in Todoist → Settings → Integrations → Developer → API token. Personal tokens never expire."
