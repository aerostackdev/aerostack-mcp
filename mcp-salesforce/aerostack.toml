name = "mcp-salesforce"
description = "Query leads, contacts, opportunities, and accounts in Salesforce — full SOQL support for enterprise CRM automation."
category = "CRM"
tags = ["crm", "salesforce", "leads", "opportunities", "enterprise"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
SALESFORCE_ACCESS_TOKEN = "Your Salesforce OAuth 2.0 access token"
SALESFORCE_INSTANCE_URL = "Your Salesforce instance URL (e.g. https://yourorg.my.salesforce.com)"
