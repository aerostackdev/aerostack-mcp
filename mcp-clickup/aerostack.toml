name = "mcp-clickup"
description = "Manage ClickUp workspaces, spaces, folders, lists, tasks, comments, and time tracking from any AI agent."
category = "Project Management"
tags = ["project-management", "clickup", "tasks", "time-tracking", "productivity"]
