name = "mcp-freshdesk"
description = "MCP server for Freshdesk — tickets, contacts, companies, agents, groups, reports"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
FRESHDESK_API_KEY = "Your Freshdesk API key (Profile Settings → API Key)"
FRESHDESK_DOMAIN = "Your Freshdesk subdomain (e.g. 'acme' for acme.freshdesk.com)"
