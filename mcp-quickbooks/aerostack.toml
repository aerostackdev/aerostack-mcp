name = "mcp-quickbooks"
description = "Manage invoices, customers, expenses, payments, and financial reports in QuickBooks Online — full accounting automation for AI agents."
category = "Accounting"
tags = ["accounting", "quickbooks", "invoices", "payments", "finance"]
env = ["QUICKBOOKS_ACCESS_TOKEN", "QUICKBOOKS_REALM_ID"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
QUICKBOOKS_ACCESS_TOKEN = "Your QuickBooks Online OAuth 2.0 access token"
QUICKBOOKS_REALM_ID = "Your QuickBooks company/realm ID (found in the URL when logged in)"
