name = "mcp-trigger-dev"
description = "Trigger.dev background job platform — manage task runs, cancel or replay runs, and create cron schedules."
category = "Developer Tools"
tags = ["trigger-dev", "background-jobs", "workflows", "tasks", "developer"]
env = ["TRIGGER_DEV_API_KEY"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
TRIGGER_DEV_API_KEY = "Your Trigger.dev API key — found in Trigger.dev Dashboard → Account → API Keys"
