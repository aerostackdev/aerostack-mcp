name = "mcp-aws"
description = "Manage AWS resources via the AWS API — S3, EC2, Lambda, IAM, CloudWatch, ECS, EKS, RDS, Secrets Manager, SSM, ECR, SNS, SQS, Route53, and CloudFormation. 60 tools covering the full AWS operations surface."
category = "Cloud"
tags = ["aws", "s3", "ec2", "lambda", "iam", "cloudwatch", "ecs", "eks", "rds", "secrets-manager", "ssm", "ecr", "sns", "sqs", "route53", "cloudformation", "amazon", "cloud", "devops", "infrastructure"]
env = ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "AWS_REGION"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
AWS_ACCESS_KEY_ID = "Your AWS Access Key ID (IAM → Users → Security credentials → Access keys)"
AWS_SECRET_ACCESS_KEY = "Your AWS Secret Access Key (shown once when creating the access key)"
AWS_REGION = "AWS region (e.g. us-east-1, eu-west-1)"
