name = "mcp-productboard"
description = "Full Productboard integration — manage features, components, products, notes, and releases for product roadmap planning."
category = "Product Management"
tags = ["productboard", "product-management", "roadmap", "features"]
env = ["PRODUCTBOARD_ACCESS_TOKEN"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
