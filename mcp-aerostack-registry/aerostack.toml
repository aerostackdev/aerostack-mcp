name = "mcp-aerostack-registry"
description = "Discover and invoke any MCP, Function, or Skill published to the Aerostack marketplace — the universal AI capability hub."
category = "Developer Tools"
tags = ["registry", "discovery", "marketplace", "aerostack"]
env = ["AEROSTACK_API_KEY"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
PLATFORM_URL = "https://api.aerostack.dev"

# Secrets (set via workspace secrets or wrangler secret put):
#   AEROSTACK_API_KEY — injected as X-Mcp-Secret-AEROSTACK-API-KEY by the gateway
