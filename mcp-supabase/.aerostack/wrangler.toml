name = "mcp-supabase"
main = "../dist/worker.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# @shared alias: import from shared/ via 'import x from "@shared/db"'
[build]
command = "npx esbuild \"src/index.ts\" --bundle --outfile=dist/worker.js --format=esm --alias:@shared=./shared --minify --external:node:* --external:cloudflare:* --platform=node --alias:path=node:path --alias:url=node:url --alias:crypto=node:crypto --alias:events=node:events --alias:util=node:util --alias:stream=node:stream --alias:buffer=node:buffer --alias:string_decoder=node:string_decoder --alias:assert=node:assert --alias:timers=node:timers --alias:async_hooks=node:async_hooks --alias:console=node:console --alias:querystring=node:querystring --alias:zlib=node:zlib --alias:punycode=node:punycode --alias:fs=./.aerostack/node-mocks.cjs --alias:node:fs=./.aerostack/node-mocks.cjs --alias:os=./.aerostack/node-mocks.cjs --alias:node:os=./.aerostack/node-mocks.cjs --alias:http=./.aerostack/node-mocks.cjs --alias:node:http=./.aerostack/node-mocks.cjs --alias:https=./.aerostack/node-mocks.cjs --alias:node:https=./.aerostack/node-mocks.cjs --alias:net=./.aerostack/node-mocks.cjs --alias:node:net=./.aerostack/node-mocks.cjs --alias:dns=./.aerostack/node-mocks.cjs --alias:node:dns=./.aerostack/node-mocks.cjs --alias:tty=./.aerostack/node-mocks.cjs --alias:node:tty=./.aerostack/node-mocks.cjs --alias:tls=./.aerostack/node-mocks.cjs --alias:node:tls=./.aerostack/node-mocks.cjs --alias:child_process=./.aerostack/node-mocks.cjs --alias:node:child_process=./.aerostack/node-mocks.cjs --banner:js=\"import { createRequire } from 'node:module'; const require = createRequire('/'); if (typeof Buffer !== 'undefined' && !Buffer.prototype.hasOwnProperty) Buffer.prototype.hasOwnProperty = Object.prototype.hasOwnProperty;\""

[vars]
AEROSTACK_API_URL = "https://api.aerocall.ai"

# Deploy: aerostack deploy --env staging | production
[env.staging]
[env.staging.vars]
AEROSTACK_API_URL = "https://api.aerocall.ai"

[env.production]
[env.production.vars]
AEROSTACK_API_URL = "https://api.aerocall.ai"

