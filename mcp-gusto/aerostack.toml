name = "mcp-gusto"
description = "Manage employees, run payroll, track benefits, and access HR data in Gusto."
category = "HR"
tags = ["gusto", "payroll", "hr", "employees", "benefits", "compensation"]
env = ["GUSTO_ACCESS_TOKEN", "GUSTO_COMPANY_ID"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
GUSTO_ACCESS_TOKEN = "Your Gusto OAuth 2.0 Bearer access token — generated via Gusto Developer OAuth flow"
GUSTO_COMPANY_ID = "Your Gusto company UUID — found in the Gusto API response for /v1/me or in the company settings"
