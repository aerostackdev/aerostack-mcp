name = "mcp-gorgias"
description = "Full Gorgias integration — manage ecommerce support tickets, customers, macros, satisfaction surveys, and team users."
category = "Customer Support"
tags = ["gorgias", "ecommerce", "customer-support", "helpdesk"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
GORGIAS_EMAIL = "Your Gorgias account email address"
GORGIAS_API_KEY = "Your Gorgias API key — found in Settings → REST API"
GORGIAS_DOMAIN = "Your Gorgias subdomain (e.g. 'mystore' for mystore.gorgias.com)"
