name = "mcp-doppler"
description = "Manage Doppler secrets, configs, projects, and service tokens — your AI agent's secure gateway to all environment variables."
category = "DevOps"
tags = ["doppler", "secrets", "environment", "config", "security"]
env = ["DOPPLER_SERVICE_TOKEN"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
DOPPLER_SERVICE_TOKEN = "Doppler Service Token. Create at: doppler.com → Project → Config → Access → Service Tokens → Generate. Use a config-scoped read or read/write token."
