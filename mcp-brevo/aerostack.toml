name = "mcp-brevo"
description = "Send transactional emails/SMS, manage contacts, and run marketing campaigns with Brevo (formerly Sendinblue)."
category = "Marketing"
tags = ["brevo", "email", "sms", "marketing", "transactional"]
env = ["BREVO_API_KEY"]
main = "src/index.ts"
