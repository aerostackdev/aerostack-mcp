name = "mcp-groq"
description = "Run ultra-fast LLM inference, speech-to-text, text-to-speech, and batch jobs with Groq's hardware-accelerated API."
category = "AI"
tags = ["ai", "llm", "inference", "groq", "speech", "whisper", "fast"]
env = ["GROQ_API_KEY"]
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[secrets]
GROQ_API_KEY = "Groq API key from https://console.groq.com/keys"
